<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日翊職安巡檢系統 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-50">
    <div class="max-w-md mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-900">日翊職安智慧巡檢</h1>
            <span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded">影像自動壓縮版</span>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-xl">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">1. 選擇倉別</label>
                    <select id="warehouse" class="w-full p-3 border rounded-xl bg-gray-50">
                        <option value="大溪倉">大溪倉</option>
                        <option value="大肚倉">大肚倉</option>
                        <option value="岡山倉">岡山倉</option>
                        <option value="新光倉">新光倉</option>
                        <option value="新光二倉">新光二倉</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">2. 紀錄等級</label>
                    <select id="level" class="w-full p-3 border rounded-xl bg-gray-50">
                        <option value="主要缺失(A)">主要缺失(A)</option>
                        <option value="次要缺失(B)">次要缺失(B)</option>
                        <option value="建議事項(C)">建議事項(C)</option>
                        <option value="一般紀錄(維運/施工)">一般紀錄(維運/施工)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">3. 紀錄類別</label>
                    <select id="category" class="w-full p-3 border rounded-xl bg-gray-50">
                        <option value="人員作業安全">人員作業安全</option>
                        <option value="設備操作安全">設備操作安全</option>
                        <option value="廠務施工">🏗️ 廠務施工</option>
                        <option value="設備維運">🔧 設備維運</option>
                        <option value="環境衛生">環境衛生</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">4. 巡檢區域</label>
                    <input type="text" id="zone" class="w-full p-3 border rounded-xl bg-gray-50" placeholder="例如：三期 1F 碼頭">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">5. 缺失描述</label>
                    <textarea id="description" rows="2" class="w-full p-3 border rounded-xl bg-gray-50" placeholder="描述現場狀況..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">6. 拍照或選取照片</label>
                    <input type="file" id="photoFile" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <p class="text-[10px] text-gray-400 mt-1">* 系統將自動縮小畫質以節省雲端空間</p>
                </div>

                <button onclick="submitForm()" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700">
                    確認提交巡檢紀錄
                </button>
            </div>
        </div>

        <div id="historySection" class="mt-8 hidden">
            <h3 class="text-gray-600 font-bold mb-3">📋 本輪已成功上傳：</h3>
            <div id="historyList" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // 這是您確認過正確的部署網址
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwVG5nTxjkxxMNssbg4FEdY1Fl4I6e_Z_pk7fFdKNrcp9hP5vhQhs8UG_JaCC2fdhR3/exec';

        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            const fileInput = document.getElementById('photoFile');
            
            if (!document.getElementById('zone').value || !document.getElementById('description').value) {
                alert('請填寫完整資訊！'); return;
            }

            btn.disabled = true;
            btn.innerHTML = "傳送中...";

            const data = {
                warehouse: document.getElementById('warehouse').value,
                level: document.getElementById('level').value,
                category: document.getElementById('category').value,
                zone: document.getElementById('zone').value,
                description: document.getElementById('description').value,
                photoData: ""
            };

            try {
                if (fileInput.files.length > 0) {
                    // 自動壓縮至寬度 800px，畫質 0.7 (70%)
                    data.photoData = await compressImage(fileInput.files[0], 800, 0.7);
                }

                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                
                alert('✅ 提交成功！影像已自動壓縮存檔。');
                showInHistory(data); // 顯示在下方的歷史清單
                
                document.getElementById('zone').value = '';
                document.getElementById('description').value = '';
                fileInput.value = '';
            } catch (e) {
                alert('提交發生錯誤：' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "確認提交紀錄";
            }
        }

        // 核心：圖片前端壓縮引擎
        function compressImage(file, maxWidth, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        function showInHistory(data) {
            const list = document.getElementById('historyList');
            document.getElementById('historySection').classList.remove('hidden');
            const item = document.createElement('div');
            item.className = "bg-white p-3 rounded-lg border-l-4 border-green-500 shadow-sm text-sm";
            item.innerHTML = `<strong>[${data.warehouse}] ${data.zone}</strong> - 已存檔`;
            list.prepend(item);
        }
    </script>
</body>
</html>
