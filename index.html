<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職安智慧巡檢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .form-card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-800">職安智慧巡檢系統</h1>
            <p class="text-gray-500 text-sm">步驟 1 & 2：現場回報</p>
        </header>

        <div class="form-card p-6">
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">1. 選擇倉別</label>
                <select id="warehouse" class="w-full p-3 border rounded-lg bg-gray-50" onchange="updateZones()">
                    <option value="">請選擇倉別</option>
                    <option value="大溪倉">大溪倉</option>
                    <option value="大肚倉">大肚倉</option>
                    <option value="岡山倉">岡山倉</option>
                    <option value="新光倉">新光倉</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">2. 巡檢區域</label>
                <select id="zone" class="w-full p-3 border rounded-lg bg-gray-50">
                    <option value="">請先選擇倉別</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">3. 缺失類別</label>
                <select id="category" class="w-full p-3 border rounded-lg bg-gray-50">
                    <option value="設備安全">設備安全</option>
                    <option value="電氣安全">電氣安全</option>
                    <option value="交通安全">交通安全</option>
                    <option value="環境衛生">環境衛生</option>
                    <option value="個人防護具">個人防護具</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">4. 缺失內容描述</label>
                <textarea id="description" rows="3" class="w-full p-3 border rounded-lg bg-gray-50" placeholder="請輸入或點擊語音輸入內容..."></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2">5. 現場照片上傳</label>
                <input type="file" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <button onclick="submitForm()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-lg hover:bg-blue-700 active:scale-95 transition-all">
                確認提交紀錄
            </button>
        </div>
    </div>

    <script>
        // 區域資料對照表
        const zoneData = {
            "大溪倉": ["碼頭區", "三期1F", "三期2F", "輸送帶區", "包裝區", "辦公室"],
            "大肚倉": ["碼頭作業區", "輸送帶區", "棧板作業區", "堆高機區"],
            "岡山倉": ["倉儲作業區", "堆高機區", "消防設施區", "碼頭區", "維修區"],
            "新光倉": ["A區", "B區", "出貨碼頭"]
        };

        function updateZones() {
            const warehouse = document.getElementById('warehouse').value;
            const zoneSelect = document.getElementById('zone');
            zoneSelect.innerHTML = '<option value="">請選擇區域</option>';
            
            if (warehouse && zoneData[warehouse]) {
                zoneData[warehouse].forEach(zone => {
                    const option = document.createElement('option');
                    option.value = zone;
                    option.textContent = zone;
                    zoneSelect.appendChild(option);
                });
            }
        }

        function submitForm() {
            alert('紀錄已儲存！(目前為單機測試模式，後續將串接 Google Sheets)');
            // 未來這裡會放串接後台的程式碼
        }
    </script>
</body>
</html>
