<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日翊職安智慧巡檢系統 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 bg-gray-50">
    <div class="max-w-md mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-900">日翊職安智慧巡檢</h1>
            <p class="text-sm text-gray-500">大溪 / 大肚 / 岡山</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">1. 選擇倉別</label>
                    <select id="warehouse" class="w-full p-3 border rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500">
                        <option value="大溪倉">大溪倉</option>
                        <option value="大肚倉">大肚倉</option>
                        <option value="岡山倉">岡山倉</option>
                        <option value="新光倉">新光倉</option>
                        <option value="新光二倉">新光二倉</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">2. 紀錄等級 / 缺失程度</label>
                    <select id="level" class="w-full p-3 border rounded-xl bg-gray-50">
                        <option value="主要缺失(A)">主要缺失 (A)</option>
                        <option value="次要缺失(B)">次要缺失 (B)</option>
                        <option value="建議事項(C)">建議事項 (C)</option>
                        <option value="一般紀錄(維運/施工)">一般紀錄 (維運 / 施工)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">3. 紀錄類別</label>
                    <select id="category" class="w-full p-3 border rounded-xl bg-gray-50">
                        <option value="人員作業安全">人員作業安全</option>
                        <option value="設備操作安全">設備操作安全</option>
                        <option value="廠區安全">廠區安全</option>
                        <option value="消防管理">消防管理</option>
                        <option value="用電安全">用電安全</option>
                        <option value="環境衛生">環境衛生</option>
                        <option value="設備維運">🔧 設備維運 (定期檢查)</option>
                        <option value="廠務施工">🏗️ 廠務施工 (監工紀錄)</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">4. 巡檢區域</label>
                    <input type="text" id="zone" class="w-full p-3 border rounded-xl bg-gray-50" placeholder="例如：三期 1F 碼頭">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">5. 說明 / 缺失描述</label>
                    <textarea id="description" rows="2" class="w-full p-3 border rounded-xl bg-gray-50" placeholder="請詳細描述狀況..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">6. 現場拍照 (必填)</label>
                    <input type="file" id="photoFile" accept="image/*" capture="camera" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <button onclick="submitForm()" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all">
                    確認提交紀錄
                </button>
            </div>
        </div>

        <div id="historySection" class="mt-8 hidden">
            <h3 class="text-gray-600 font-bold mb-3 flex items-center">
                <span class="mr-2">📋</span> 本輪巡檢紀錄 (已成功上傳)
            </h3>
            <div id="historyList" class="space-y-3">
                </div>
        </div>
    </div>

    <script>
        // 已填入您剛才提供的專屬網址
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwVG5nTxjkxxMNssbg4FEdY1Fl4I6e_Z_pk7fFdKNrcp9hP5vhQhs8UG_JaCC2fdhR3/exec';

        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            const fileInput = document.getElementById('photoFile');
            
            // 基本欄位校驗
            const warehouse = document.getElementById('warehouse').value;
            const zone = document.getElementById('zone').value;
            const description = document.getElementById('description').value;

            if (!zone || !description) {
                alert('請填寫巡檢區域與描述！');
                return;
            }

            // 按鈕狀態更新
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div>正在傳送至雲端...';

            const data = {
                warehouse: warehouse,
                level: document.getElementById('level').value,
                category: document.getElementById('category').value,
                zone: zone,
                description: description,
                photoData: ""
            };

            try {
                // 處理圖片轉換
                if (fileInput.files.length > 0) {
                    data.photoData = await toBase64(fileInput.files[0]);
                }

                // 傳送資料到 Google Apps Script
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });

                // 上傳成功後的處理
                alert('✅ 提交成功！\n資料已寫入對應倉別分頁。');
                
                // 紀錄到歷史清單
                updateHistory(data);

                // 清空輸入欄位
                document.getElementById('zone').value = '';
                document.getElementById('description').value = '';
                fileInput.value = '';
                
            } catch (error) {
                console.error('Error!', error.message);
                alert('提交失敗，請檢查網路連線。');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '確認提交紀錄';
            }
        }

        // 圖片轉 Base64 邏輯
        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // 前端歷史紀錄更新
        function updateHistory(data) {
            const historySection = document.getElementById('historySection');
            const historyList = document.getElementById('historyList');
            historySection.classList.remove('hidden');

            const item = document.createElement('div');
            item.className = "bg-white p-4 rounded-xl border-l-4 border-green-500 shadow-sm text-sm";
            item.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <span class="font-bold text-gray-800">[${data.warehouse}] ${data.zone}</span>
                        <p class="text-gray-600 mt-1">${data.description}</p>
                    </div>
                    <span class="text-green-600 font-bold">成功</span>
                </div>
            `;
            historyList.prepend(item);
        }
    </script>
</body>
</html>
