<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職安智慧巡檢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .form-card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-800">職安智慧巡檢系統</h1>
            <p class="text-gray-500 text-sm">步驟 1 & 2：現場回報</p>
        </header>

        <div class="form-card p-6">
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">1. 選擇倉別</label>
                <select id="warehouse" class="w-full p-3 border rounded-lg bg-gray-50">
                    <option value="">請選擇倉別</option>
                    <option value="大溪倉">大溪倉</option>
                    <option value="大肚倉">大肚倉</option>
                    <option value="岡山倉">岡山倉</option>
                    <option value="新光倉">新光倉</option>
                    <option value="新光二倉">新光二倉</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">2. 巡檢區域 (手動填寫)</label>
                <input type="text" id="zone" class="w-full p-3 border rounded-lg bg-gray-50" placeholder="例如：三期 1F 門口">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">3. 缺失類別</label>
                <select id="category" class="w-full p-3 border rounded-lg bg-gray-50">
                    <option value="人員作業安全">人員作業安全</option>
                    <option value="設備操作安全">設備操作安全</option>
                    <option value="廠區安全">廠區安全</option>
                    <option value="消防管理">消防管理</option>
                    <option value="設備維運">設備維運</option>
                    <option value="用電安全">用電安全</option>
                    <option value="環境衛生">環境衛生</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">4. 缺失內容描述</label>
                <textarea id="description" rows="3" class="w-full p-3 border rounded-lg bg-gray-50" placeholder="請描述缺失狀況..."></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2">5. 現場照片上傳</label>
                <input type="file" id="photo" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>

            <button onclick="submitForm()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow-lg hover:bg-blue-700 active:scale-95 transition-all">
                確認提交紀錄
            </button>
        </div>
    </div>

    <script>
        function submitForm() {
            const data = {
                warehouse: document.getElementById('warehouse').value,
                zone: document.getElementById('zone').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value
            };

            if (!data.warehouse || !data.zone || !data.description) {
                alert('請填寫完整資訊！');
                return;
            }

            alert('紀錄已暫存！\n地點：' + data.warehouse + ' - ' + data.zone + '\n類別：' + data.category);
            // 稍後我們將串接 Google Sheets 儲存功能
        }
    </script>
</body>
</html>
